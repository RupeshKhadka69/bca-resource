services:
  postgres:
    image: postgres:16-alpine
    container_name: bca_resource_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bca_resource
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
